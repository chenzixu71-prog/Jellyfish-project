services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?set MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER:?set MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8010
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      AI_PROVIDER: deepseek
      AI_MODEL: deepseek-v4-flash
      AI_REPORT_MODEL: deepseek-v4-pro
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?set DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      SEARCH_PROVIDER: tavily
      TAVILY_API_KEY: ${TAVILY_API_KEY:?set TAVILY_API_KEY}
      SEARCH_MAX_RESULTS: 5
      SEARCH_DEPTH: basic
      EXTRACT_DEPTH: basic
      TAVILY_TIMEOUT_SECONDS: 8
      WECHAT_AUTH_MODE: wechat
      WECHAT_APP_ID: ${WECHAT_APP_ID:?set WECHAT_APP_ID}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:?set WECHAT_APP_SECRET}
      AUTH_TOKEN_TTL_DAYS: 7
      STORAGE_BACKEND: mysql
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL with a URL-encoded password}
    ports:
      - "127.0.0.1:8010:8010"

volumes:
  mysql_data:
