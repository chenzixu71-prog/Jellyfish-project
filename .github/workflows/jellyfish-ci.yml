name: Jellyfish CI

on:
  push:
    paths:
      - "02-Python全栈AI刷题学习小程序/**"
      - ".github/workflows/jellyfish-ci.yml"
  pull_request:
    paths:
      - "02-Python全栈AI刷题学习小程序/**"
      - ".github/workflows/jellyfish-ci.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      APP_ENV: development
      AI_PROVIDER: mock
      SEARCH_PROVIDER: mock
      WECHAT_AUTH_MODE: mock
      STORAGE_BACKEND: memory
      PYTHONPATH: .
    defaults:
      run:
        working-directory: 02-Python全栈AI刷题学习小程序/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: 02-Python全栈AI刷题学习小程序/backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest -q

  weapp-production-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 02-Python全栈AI刷题学习小程序/frontend
    env:
      TARO_APP_ID: wx1234567890abcdef
      TARO_APP_API_BASE_URL: https://api.example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 02-Python全栈AI刷题学习小程序/frontend/package-lock.json
      - run: npm ci
      - run: npm run build:weapp:prod
